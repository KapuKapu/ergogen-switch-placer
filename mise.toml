[tools]
uv = "latest"

[tasks.test]
run = "uv run python -m pytest -v"
description = "Run placement tests"

[tasks.lint]
run = "uv run ruff check ."
description = "Lint with ruff"

[tasks.format]
run = "uv run ruff format ."
description = "Format with ruff"

[tasks.run-plugin]
run = "uv run --extra plugin python plugins/action.py"
description = "Run the KiCad plugin standalone"
